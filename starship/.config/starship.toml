format = """
$env_var\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$java\
$cmd_duration\
$line_break\
$character"""

right_format = ""

command_timeout = 5000
scan_timeout = 70

[directory]
style = "bold #8aadf4"
truncation_length = 4
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #c6a0f6"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold #ed8796"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "
style = "#a6da95"

[python]
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
symbol = " "
style = "#eed49f"

[rust]
format = "[$symbol($version)]($style) "
symbol = " "
style = "#f5a97f"

[golang]
format = "[$symbol($version)]($style) "
symbol = " "
style = "#8bd5ca"

[java]
format = "[$symbol($version)]($style) "
symbol = " "
style = "#ed8796"

[cmd_duration]
format = "[ $duration]($style) "
style = "#a5adcb"
min_time = 500

[env_var.SSH_CONNECTION]
variable = "SSH_CONNECTION"
format = "[  ssh]($style) "
style = "bold #ed8796"

[character]
success_symbol = "[❯](bold #a6da95)"
error_symbol = "[❯](bold #ed8796)"

[os]
format = "[$symbol]($style) "
style = "#a5adcb"
disabled = false

[os.symbols]
Linux = "󰌽 "
Macos = "󰀵 "
Windows = "󰍲 "

[time]
disabled = true
