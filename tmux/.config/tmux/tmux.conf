set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi

set -g prefix C-b
unbind C-Space
bind C-b send-prefix

# start with zsh
set-option -g default-shell /bin/zsh

# style
# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_status_modules_right ""

# Pane borders — heavy line = halo effect on active pane
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#363a4f'
set -g pane-active-border-style 'fg=#f5bde6'

# Resurrect / Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank — stay in copy mode after yanking
set -g @yank_action 'copy-pipe-no-clear'

run '~/.tmux/plugins/tpm/tpm'

# Keep the active window label compact when opencode owns the pane.
setw -g window-status-current-format "#[fg=#24273a,bg=#f5a97f] #I #[fg=#cad3f5,bg=#363a4f] #{?#{==:#{pane_current_command},opencode},oc - #{b:pane_current_path},#{b:pane_current_path}} "

# Opens panes in current directory
bind "-" split-window -v -c "#{pane_current_path}"
bind "|" split-window -h -c "#{pane_current_path}"

# Mouse wheel: forward to apps that handle mouse events, otherwise enter copy mode
# and use tmux scrollback.
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t = \; send-keys -M

# Lazygit / Lazydocker tmux popups
bind g display-popup -e TERM=xterm-256color -d "#{pane_current_path}" -w 90% -h 90% -E lazygit
bind D display-popup -e TERM=xterm-256color -d "#{pane_current_path}" -w 90% -h 90% -E lazydocker
